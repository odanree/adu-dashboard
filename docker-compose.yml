# ============================================================================
# ADU Dashboard — full local stack
#
# Launch:    docker compose up -d --build
# Tear down: docker compose down
#
# Ports:
#   API         http://localhost:8080
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3001  (admin / see GF_SECURITY_ADMIN_PASSWORD)
#
# Required env vars (copy .env.example → .env and fill in):
#   GOOGLE_SHEET_ID
#   GOOGLE_SERVICE_ACCOUNT_JSON   (or use .gcp-service-account.json)
#   GF_SECURITY_ADMIN_PASSWORD
# ============================================================================

name: adu

services:

  adu-api:
    build: .
    container_name: adu-api
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PORT=8080
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - WHITELISTED_EMAILS=${WHITELISTED_EMAILS:-dtle82@gmail.com}
    volumes:
      - ./.gcp-service-account.json:/app/.gcp-service-account.json:ro
    networks:
      - adu-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: adu-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - adu-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: adu-grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - adu-net
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  adu-net:
    driver: bridge
