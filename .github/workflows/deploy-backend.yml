name: Deploy Backend to Hetzner

on:
  push:
    branches: [ master ]
    paths:
      - 'server.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
      - 'packages/api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets are set
        env:
          WHITELISTED_EMAILS: ${{ secrets.WHITELISTED_EMAILS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          : "${WHITELISTED_EMAILS:?missing repo secret WHITELISTED_EMAILS}"
          : "${GOOGLE_SHEET_ID:?missing repo secret GOOGLE_SHEET_ID}"
          : "${GF_SECURITY_ADMIN_PASSWORD:?missing repo secret GF_SECURITY_ADMIN_PASSWORD}"
          : "${GOOGLE_SERVICE_ACCOUNT_JSON:?missing repo secret GOOGLE_SERVICE_ACCOUNT_JSON}"
          : "${HETZNER_HOST:?missing repo secret HETZNER_HOST}"
          : "${HETZNER_SSH_KEY:?missing repo secret HETZNER_SSH_KEY}"
          echo "✅ all required secrets present"

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "server.py,Dockerfile,requirements.txt,docker-compose.yml,packages/api/**"
          target: /opt/adu-dashboard/

      - name: Sync secrets into /opt/adu-dashboard/.env (merge, not overwrite)
        uses: appleboy/ssh-action@v1.0.3
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WHITELISTED_EMAILS: ${{ secrets.WHITELISTED_EMAILS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: SA_JSON,WHITELISTED_EMAILS,GOOGLE_SHEET_ID,GF_SECURITY_ADMIN_PASSWORD
          script: |
            set -euo pipefail
            mkdir -p /opt/adu-dashboard
            printf '%s' "$SA_JSON" > /opt/adu-dashboard/.gcp-service-account.json
            chmod 600 /opt/adu-dashboard/.gcp-service-account.json

            ENV_FILE=/opt/adu-dashboard/.env
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"

            # Merge one key without touching the rest of .env
            update_key() {
              local key="$1"; local value="$2"
              local tmp="${ENV_FILE}.new"
              grep -v "^${key}=" "$ENV_FILE" > "$tmp" 2>/dev/null || true
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" "$ENV_FILE"
              chmod 600 "$ENV_FILE"
            }
            update_key WHITELISTED_EMAILS "$WHITELISTED_EMAILS"
            update_key GOOGLE_SHEET_ID "$GOOGLE_SHEET_ID"
            update_key GF_SECURITY_ADMIN_PASSWORD "$GF_SECURITY_ADMIN_PASSWORD"

      - name: Build and recreate adu-api via docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/adu-dashboard

            OLD_ID=$(docker inspect -f '{{.Id}}' adu-api 2>/dev/null || echo "none")

            docker compose up -d --build --force-recreate adu-api

            sleep 4
            NEW_ID=$(docker inspect -f '{{.Id}}' adu-api)

            if [ "$OLD_ID" = "$NEW_ID" ]; then
              echo "❌ Container ID did not change — recreate failed"
              docker compose logs --tail 50 adu-api
              exit 1
            fi
            echo "✅ Container recreated (was: ${OLD_ID:0:12}, now: ${NEW_ID:0:12})"

            curl -sf http://127.0.0.1:8888/health > /dev/null \
              && echo "✅ /health OK" \
              || (echo "❌ /health failed"; docker compose logs --tail 50 adu-api; exit 1)

      # Phase D1 canary: build + start adu-api-ts alongside adu-api. This
      # step is additive — if it fails, Python adu-api is unaffected
      # (already recreated in the previous step). Both containers serve
      # the same sheet on different internal ports; Caddy still routes
      # /api/* to adu-api until a separate Caddy PR flips it.
      - name: Build and recreate adu-api-ts (canary, Python untouched)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/adu-dashboard

            OLD_ID=$(docker inspect -f '{{.Id}}' adu-api-ts 2>/dev/null || echo "none")

            docker compose up -d --build --force-recreate adu-api-ts

            sleep 4
            NEW_ID=$(docker inspect -f '{{.Id}}' adu-api-ts)

            if [ "$OLD_ID" = "$NEW_ID" ]; then
              echo "❌ adu-api-ts container ID did not change — recreate failed"
              docker compose logs --tail 50 adu-api-ts
              exit 1
            fi
            echo "✅ adu-api-ts recreated (was: ${OLD_ID:0:12}, now: ${NEW_ID:0:12})"

            curl -sf http://127.0.0.1:8889/health > /dev/null \
              && echo "✅ adu-api-ts /health OK" \
              || (echo "❌ adu-api-ts /health failed"; docker compose logs --tail 50 adu-api-ts; exit 1)

            # Sanity-check that the canary returns canonical or live data
            # shape. Doesn't compare against Python here (that's the
            # operator's job during canary verification).
            curl -sf http://127.0.0.1:8889/api/data | head -c 200 || true
